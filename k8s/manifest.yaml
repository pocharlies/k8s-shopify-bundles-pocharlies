apiVersion: apps/v1
kind: Deployment
metadata:
  name: bundles-app
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: bundles-app } }
  template:
    metadata: { labels: { app: bundles-app } }
    spec:
      enableServiceLinks: false
      # Sauvage taint needed? bundles-app was running on sauvage.
      # Migrate to LAN k3s (amd64) if no sauvage-specific dependency.
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: bundles-app
          image: harbor.e-dani.com/homelab/shopify-bundle-app@sha256:fd50b43dde4f52076707a487d273cfeadae3f75d3ef7fd9c48698c1d223eb6ca
          ports: [{ name: http, containerPort: 3460 }]
          env:
            - { name: PORT, value: "3460" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@shared-postgres-rw.skirmshop.svc.cluster.local:5432/skirmshop" }
            - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/bundles" }
            - { name: SHOPIFY_ALLOWED_SHOPS, value: "skirmshop-spain.myshopify.com" }
            - { name: SHOPIFY_APP_PROXY_MAX_AGE_SECONDS, value: "300" }
            - { name: STANDALONE_CONFIGURATOR_ENABLED, value: "false" }
            - { name: SCOPES, value: "read_products,write_products,read_inventory,read_orders,write_app_proxy" }
            - { name: NODE_ENV, value: "production" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 3460 }
            initialDelaySeconds: 20
---
---
apiVersion: v1
kind: Service
metadata: { name: bundles-app, namespace: skirmshop }
spec:
  selector: { app: bundles-app }
  ports: [{ name: http, port: 80, targetPort: 3460 }]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: skirmshop-bundles-public
  namespace: skirmshop
  annotations:
    external-dns.alpha.kubernetes.io/hostname: skirmshop.e-dani.com
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [websecure]
  ingressClassName: traefik-edge
  routes:
    - match: Host(`skirmshop.e-dani.com`) && PathPrefix(`/bundles`)
      kind: Rule
      services:
        - name: bundles-app
          port: 80
  tls: {}
